```yaml
header:
  version: 14

machine: qemux86-64
distro: poky

target:
  - sirius-dev-image

repos:
  poky:
    url: https://git.yoctoproject.org/poky
    branch: kirkstone
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: https://git.openembedded.org/meta-openembedded
    branch: kirkstone
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:

  meta-sirius:
    path: .
    layers:
      .:

local_conf_header:
  meta-sirius: |
    PACKAGE_CLASSES = "package_ipk"
    EXTRA_IMAGE_FEATURES += "debug-tweaks"

    BB_NUMBER_THREADS ?= "2"
    PARALLEL_MAKE ?= "-j2"

    CONF_VERSION = "2"
```

